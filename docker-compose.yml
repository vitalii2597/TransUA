version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transua}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transua}
      POSTGRES_DB: ${POSTGRES_DB:-transua}
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
